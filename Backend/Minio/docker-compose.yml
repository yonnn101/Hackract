services:
  minio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hackract-minio
    image: hackract-minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: hackract_admin
      MINIO_ROOT_PASSWORD: hackract_secret_123
    volumes:
      - minio_data:/data

volumes:
  minio_data: