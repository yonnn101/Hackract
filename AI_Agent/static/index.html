            text-align: center;
        }

        .input-container {

            flex: 1;

        }

        #messageInput:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #00ff88;
        }

        #sendButton {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        #sendButton:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 255, 136, 0.4);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #stopButton {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff4b4b, #cc0000);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: none;
            /* Hidden by default */

        #stopButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 75, 75, 0.4);
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);

            border-radius: 50%;

        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        }

            background: rgba(255, 255, 255, 0.2);

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
        }

        .toggle-label {
            font-size: 0.875rem;
            color: var(--text);
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: 0.2s;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }

        input:checked + .toggle-slider {
            background: var(--accent);
            border-color: var(--accent);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

<body>
    <div class="container">
        <div class="header">
            <h1> HackrAct AI Agent</h1>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="status" id="status">● Connecting...</div>
                <a href="settings.html"
                    style="padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; text-decoration: none; font-size: 12px; transition: all 0.3s;"
                    onmouseover="this.style.background='rgba(255,255,255,0.2)'"
                    onmouseout="this.style.background='rgba(255,255,255,0.1)'">⚙️ Settings</a>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message system">
                <div class="message-content">
                    Welcome to HackrAct AI Agent - Your AI-powered web application penetration tester.
                    <br>Ask me to scan websites, test for vulnerabilities, or install security tools!
                </div>
            </div>
        </div>

        <div class="input-container">
            <input type="text" id="messageInput"
                placeholder="Ask the agent anything... (e.g., 'Scan localhost for vulnerabilities')">
            <button id="stopButton">Stop</button>
            <button id="sendButton">Send</button>
        </div>
    </div>

    <script>
        // Use relative URL so it works on any host/port
        const API_URL = '';
        const WS_PROTOCOL = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const WS_URL = `${WS_PROTOCOL}//${window.location.host}`;

        let session_id = localStorage.getItem('hackract_session_id');
        if (!session_id) {
            session_id = 'session_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('hackract_session_id', session_id);
        }

        let isProcessing = false;
        let socket = null;

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const stopButton = document.getElementById('stopButton');
        const statusElement = document.getElementById('status');

        // Initialize WebSocket
        function connectWebSocket() {
            socket = new WebSocket(`${WS_URL}/ws/${session_id}`);

            socket.onopen = () => {
                console.log('WebSocket connected');
                statusElement.textContent = '● Online';
                statusElement.classList.add('online');
            };

            socket.onclose = () => {
                console.log('WebSocket disconnected');
                statusElement.textContent = '● Offline';
                statusElement.classList.remove('online');
                // Try to reconnect after 5 seconds
                setTimeout(connectWebSocket, 5000);
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
        }

        function handleWebSocketMessage(data) {
            // Remove thinking message if it exists
            if (data.type === 'response' || data.type === 'error') {
                document.getElementById('thinking')?.remove();
                isProcessing = false;
                sendButton.style.display = 'block';
                stopButton.style.display = 'none';
                messageInput.focus();
            }

            if (data.type === 'response') {
                addMessage('assistant', data.content);
            } else if (data.type === 'error') {
                addMessage('system', `Error: ${data.content}`);
            } else if (data.type === 'thought') {
                // Update thinking message or add new one
                let thinkingDiv = document.getElementById('thinking');
                if (!thinkingDiv) {
                    thinkingDiv = document.createElement('div');
                    thinkingDiv.className = 'message assistant';
                    thinkingDiv.id = 'thinking';
                    chatContainer.appendChild(thinkingDiv);
                }
                thinkingDiv.innerHTML = `<div class="message-content" style="background: rgba(0, 255, 136, 0.1); border-color: rgba(0, 255, 136, 0.3);">
                    <div style="font-weight: bold; color: #00ff88; margin-bottom: 5px;">💭 Thinking:</div>
                    ${data.content}
                </div>`;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } else if (data.type === 'tool') {
                // Show tool execution
                const toolDiv = document.createElement('div');
                toolDiv.className = 'message system';
                toolDiv.innerHTML = `<div class="message-content" style="font-family: monospace; font-size: 12px;">
                    🛠️ ${data.content}
                </div>`;
                chatContainer.appendChild(toolDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } else if (data.type === 'tool_output') {
                // Show tool output (maybe collapsed or small)
                const outputDiv = document.createElement('div');
                outputDiv.className = 'message system';
                outputDiv.innerHTML = `<div class="message-content" style="font-family: monospace; font-size: 11px; opacity: 0.8;">
                    <details>
                        <summary>View Output</summary>
                        <pre style="margin-top: 5px; white-space: pre-wrap;">${data.content}</pre>
                    </details>
                </div>`;
                chatContainer.appendChild(outputDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } else if (data.type === 'status') {
                // Generic status update
                // console.log("Status:", data.content);
            }
        }

        // Check API health
        async function checkHealth() {
            try {
                // Try /api/health first (new endpoint), fall back to /health (old)
                let response = await fetch(`${API_URL}/api/health`);
                if (!response.ok) response = await fetch(`${API_URL}/health`);

                const data = await response.json();
                // statusElement.textContent = `● Online - ${data.agent_name}`; // WebSocket handles online status
            } catch (error) {
                // statusElement.textContent = '● Offline - Cannot connect to API';
            }
        }

        // Add message to chat
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // Format code blocks
            const formattedContent = content.replace(/```(.*?)```/gs, (match, code) => {
                return `<div class="code-block">${code.trim()}</div>`;
            });

            contentDiv.innerHTML = formattedContent;

            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = new Date().toLocaleTimeString();
            contentDiv.appendChild(timestamp);

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Send message to agent
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isProcessing) return;

            if (!socket || socket.readyState !== WebSocket.OPEN) {
                addMessage('system', 'Error: WebSocket not connected. Reconnecting...');
                connectWebSocket();
                return;
            }

            // Add user message
            addMessage('user', message);
            messageInput.value = '';

            // Disable input
            isProcessing = true;
            sendButton.style.display = 'none';
            stopButton.style.display = 'block';

            // Add "thinking" message placeholder
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message assistant';
            thinkingDiv.id = 'thinking';
            thinkingDiv.innerHTML = '<div class="message-content"><span class="loading"></span> Agent is thinking...</div>';
            chatContainer.appendChild(thinkingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Send via WebSocket
            socket.send(JSON.stringify({
                message: message,
                type: 'message'
            }));
        }

        // Stop agent execution
        async function stopAgent() {
            if (!isProcessing) return;

            // Send stop via WebSocket if possible, else API
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'stop'
                }));
                addMessage('system', '🛑 Sending stop command...');
            } else {
                // Fallback to API
                try {
                    await fetch(`${API_URL}/api/session/${session_id}/stop`, { method: 'POST' });
                } catch (e) {
                    console.error(e);
                }
            }
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        stopButton.addEventListener('click', stopAgent);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Initialize
        connectWebSocket();
        checkHealth();
        setInterval(checkHealth, 30000); // Check health every 30 seconds
    </script>
</body>
